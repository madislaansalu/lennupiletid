<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TLL → TYO lennuhinnad 2027</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, sans-serif; background: #f4f6f9; color: #1a1a2e; }
header {
  background: #1a1a2e; color: #fff;
  padding: 1rem 2rem;
  display: flex; align-items: center; justify-content: space-between;
}
header h1 { font-size: 1.2rem; }
.updated { font-size: .8rem; opacity: .6; }
.wrap { max-width: 1100px; margin: 0 auto; padding: 2rem 1rem; }
.filters {
  display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap;
}
.filters label { font-size: .85rem; font-weight: 600; color: #555; }
.filters select {
  margin-left: .4rem; padding: 6px 10px;
  border: 1px solid #ccc; border-radius: 6px;
  font-size: .9rem; background: #fff;
}
.cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; margin-bottom: 2.5rem; }
.card {
  background: #fff; border-radius: 12px;
  padding: 1.2rem 1.4rem;
  box-shadow: 0 2px 8px rgba(0,0,0,.07);
  border-left: 4px solid #ccc;
}
.card.BUSINESS { border-color: #1a1a2e; }
.card.PREMIUM_ECONOMY { border-color: #c84b31; }
.card-date { font-size: .75rem; color: #888; margin-bottom: .3rem; }
.card-price { font-size: 2rem; font-weight: 700; margin-bottom: .3rem; }
.card-cabin {
  display: inline-block; font-size: .7rem; font-weight: 700;
  padding: 2px 8px; border-radius: 20px; margin-bottom: .5rem;
  text-transform: uppercase; letter-spacing: .05em;
}
.BUSINESS .card-cabin { background: #1a1a2e; color: #fff; }
.PREMIUM_ECONOMY .card-cabin { background: #c84b31; color: #fff; }
.card-detail { font-size: .82rem; color: #555; line-height: 1.8; }
.chart-wrap {
  background: #fff; border-radius: 12px;
  padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,.07);
  margin-bottom: 2rem;
}
.chart-wrap h2 { font-size: 1rem; margin-bottom: 1rem; color: #333; }
.empty { text-align: center; padding: 4rem; color: #aaa; font-size: 1rem; }
</style>
</head>
<body>
<header>
  <h1>✈ TLL → Tokyo · Aprill 2027</h1>
  <span class="updated" id="updated">Laen...</span>
</header>
<div class="wrap">
  <div class="filters">
    <div>
      <label>Klass:
        <select id="cabinFilter" onchange="render()">
          <option value="ALL">Kõik</option>
          <option value="BUSINESS">Business</option>
          <option value="PREMIUM_ECONOMY">Premium Economy</option>
        </select>
      </label>
    </div>
    <div>
      <label>Lennujaam:
        <select id="destFilter" onchange="render()">
          <option value="ALL">Mõlemad (NRT + HND)</option>
          <option value="NRT">Tokyo Narita (NRT)</option>
          <option value="HND">Tokyo Haneda (HND)</option>
        </select>
      </label>
    </div>
    <div>
      <label>Kuupäev:
        <select id="dateFilter" onchange="render()">
          <option value="ALL">Kõik kuupäevad</option>
        </select>
      </label>
    </div>
  </div>

  <div class="chart-wrap">
    <h2>Parimate hindade trend (viimane kontroll per kuupäev)</h2>
    <canvas id="chart" height="80"></canvas>
  </div>

  <div class="cards" id="cards"></div>
</div>

<script>
let allData = [];

async function loadData() {
  try {
    const res = await fetch("data/prices.json?t=" + Date.now());
    const json = await res.json();
    allData = json.entries || [];
    document.getElementById("updated").textContent =
      json.updated ? "Uuendatud: " + json.updated : "Andmed puuduvad";

    // populate date filter
    const dates = [...new Set(allData.map(e => e.flight_date))].sort();
    const sel = document.getElementById("dateFilter");
    dates.forEach(d => {
      const opt = document.createElement("option");
      opt.value = d; opt.textContent = d;
      sel.appendChild(opt);
    });

    render();
    renderChart();
  } catch(e) {
    document.getElementById("cards").innerHTML =
      '<p class="empty">Andmeid ei leitud. Skript pole veel jooksnud.</p>';
  }
}

function filtered() {
  const cabin = document.getElementById("cabinFilter").value;
  const dest = document.getElementById("destFilter").value;
  const date = document.getElementById("dateFilter").value;

  // latest entry per (flight_date, destination, cabin)
  const map = {};
  allData.forEach(e => {
    const key = `${e.flight_date}|${e.destination}|${e.cabin}`;
    if (!map[key] || e.checked > map[key].checked) map[key] = e;
  });

  return Object.values(map).filter(e =>
    (cabin === "ALL" || e.cabin === cabin) &&
    (dest === "ALL" || e.destination === dest) &&
    (date === "ALL" || e.flight_date === date)
  ).sort((a, b) => a.flight_date.localeCompare(b.flight_date) || a.cabin.localeCompare(b.cabin));
}

function render() {
  const data = filtered();
  const container = document.getElementById("cards");
  if (!data.length) {
    container.innerHTML = '<p class="empty">Andmeid ei leitud.</p>';
    return;
  }
  container.innerHTML = data.map(e => `
    <div class="card ${e.cabin}">
      <div class="card-date">${e.flight_date} · ${e.destination}</div>
      <div class="card-price">${e.best_price.toLocaleString("et-EE")} €</div>
      <span class="card-cabin">${e.cabin === "BUSINESS" ? "Business" : "Premium Economy"}</span>
      <div class="card-detail">
        ✈ ${e.airlines.join(", ")}<br>
        ⏱ ${e.duration.replace("PT","").toLowerCase()}<br>
        🔁 ${e.stops === 0 ? "Otselend" : e.stops + " vahemaandumist"}<br>
        📅 Kontrollitud: ${e.checked}
      </div>
    </div>
  `).join("");
}

function renderChart() {
  const dates = [...new Set(allData.map(e => e.flight_date))].sort();

  const bestPerDate = (cabin) => dates.map(date => {
    const entries = allData.filter(e => e.flight_date === date && e.cabin === cabin);
    if (!entries.length) return null;
    const latest = entries.reduce((a, b) => a.checked > b.checked ? a : b);
    return latest.best_price;
  });

  const ctx = document.getElementById("chart").getContext("2d");
  new Chart(ctx, {
    type: "line",
    data: {
      labels: dates,
      datasets: [
        {
          label: "Business",
          data: bestPerDate("BUSINESS"),
          borderColor: "#1a1a2e",
          backgroundColor: "rgba(26,26,46,.1)",
          tension: 0.3,
          spanGaps: true
        },
        {
          label: "Premium Economy",
          data: bestPerDate("PREMIUM_ECONOMY"),
          borderColor: "#c84b31",
          backgroundColor: "rgba(200,75,49,.1)",
          tension: 0.3,
          spanGaps: true
        }
      ]
    },
    options: {
      responsive: true,
      plugins: { legend: { position: "top" } },
      scales: {
        y: {
          ticks: { callback: v => v + " €" }
        }
      }
    }
  });
}

loadData();
</script>
</body>
</html>
