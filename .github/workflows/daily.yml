name: Uuenda lennuhinnad

on:
  schedule:
    - cron: "0 6 * * 1,4"  # esmaspäev + neljapäev kell 09:00 Tallinna aja järgi
  workflow_dispatch:         # käsitsi käivitamine

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installi sõltuvused
        run: pip install requests

      - name: Päri lennuhinnad
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: python fetch_prices.py

      - name: Salvesta muudatused
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices.json
          git diff --cached --quiet || git commit -m "Lennuhinnad $(date +%Y-%m-%d)"
          git push
