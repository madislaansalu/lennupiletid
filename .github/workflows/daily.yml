name: Uuenda lennuhinnad

on:
  schedule:
    - cron: "0 6 * * *"  # iga päev kell 09:00 Tallinna aja järgi
  workflow_dispatch:       # võimaldab käivitada käsitsi

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installi sõltuvused
        run: pip install amadeus

      - name: Päri lennuhinnad
        env:
          AMADEUS_API_KEY: ${{ secrets.AMADEUS_API_KEY }}
          AMADEUS_API_SECRET: ${{ secrets.AMADEUS_API_SECRET }}
        run: python fetch_prices.py

      - name: Salvesta muudatused
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices.json
          git diff --cached --quiet || git commit -m "Uuenda lennuhinnad $(date +%Y-%m-%d)"
          git push
